<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infra Risk DXF Converter</title>

<style>
body{
font-family:Arial;
background:#111;
color:#eee;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

button{
padding:10px 16px;
margin-top:10px;
}

pre{
background:#000;
padding:20px;
overflow:auto;
max-height:400px;
}
</style>
</head>

<body>

<div class="container">

<h1>DXF → JSON converter</h1>
<p>Input: SWEREF 99 TM</p>
<p>Output: WGS84 lat/lon</p>

<input type="file" id="fileInput">

<br>

<button onclick="downloadJSON()">Download JSON</button>

<h3>Result</h3>

<pre id="output"></pre>

</div>

<script>

let result = [];

/* SWEREF99 TM -> WGS84 */
function swerefToWGS84(x,y){

let lon = (x - 500000) / 111320 + 15;
let lat = y / 110540;

return {lat,lon};

}

document.getElementById("fileInput").addEventListener("change",function(e){

let file = e.target.files[0];

let reader = new FileReader();

reader.onload = function(evt){

parseDXF(evt.target.result);

};

reader.readAsText(file);

});

function parseDXF(text){

result = [];

let lines = text.split("\n");

for(let i=0;i<lines.length;i++){

let line = lines[i].trim();

if(line==="POINT"){

let x=0;
let y=0;

for(let j=i;j<i+20;j++){

if(lines[j].trim()==="10") x=parseFloat(lines[j+1]);
if(lines[j].trim()==="20") y=parseFloat(lines[j+1]);

}

let c = swerefToWGS84(x,y);

result.push({
type:"point",
lat:c.lat,
lon:c.lon
});

}

if(line==="LINE"){

let x1,y1,x2,y2;

for(let j=i;j<i+40;j++){

if(lines[j].trim()==="10") x1=parseFloat(lines[j+1]);
if(lines[j].trim()==="20") y1=parseFloat(lines[j+1]);

if(lines[j].trim()==="11") x2=parseFloat(lines[j+1]);
if(lines[j].trim()==="21") y2=parseFloat(lines[j+1]);

}

let c1 = swerefToWGS84(x1,y1);
let c2 = swerefToWGS84(x2,y2);

result.push({
type:"line",
coordinates:[
{lat:c1.lat,lon:c1.lon},
{lat:c2.lat,lon:c2.lon}
]
});

}

}

document.getElementById("output").textContent =
JSON.stringify(result,null,2);

}

function downloadJSON(){

let blob = new Blob(
[JSON.stringify(result,null,2)],
{type:"application/json"}
);

let url = URL.createObjectURL(blob);

let a = document.createElement("a");

a.href=url;
a.download="infra-risk.json";

a.click();

}

</script>

</body>
</html>
